max_iterations: 25
checkpoint_interval: 5

llm:
  # Anthropic's OpenAI-compatible endpoint.
  # Set OPENAI_API_KEY=$ANTHROPIC_API_KEY before running.
  primary_model: "claude-opus-4-8"
  primary_model_weight: 1.0
  secondary_model: "claude-opus-4-8"
  secondary_model_weight: 0.0
  api_base: "https://api.anthropic.com/v1"
  max_tokens: 8000
  timeout: 180

prompt:
  system_message: >
    You are an expert CUDA/Triton kernel engineer. Your task is to optimize a Triton
    GPU kernel that converts RGB images to grayscale using Y = 0.2989R + 0.5870G + 0.1140B.
    The kernel runs on an NVIDIA H100. Optimize for minimum geometric mean latency across
    image sizes from 1024×1024 to 8192×8192. Focus on: memory access patterns (coalescing,
    vectorized loads), BLOCK_SIZE tuning, exploiting H100 memory bandwidth, and reducing
    arithmetic overhead. The function signature must remain: custom_kernel(data) where
    data = (rgb_tensor, output_tensor).

database:
  population_size: 20
  archive_size: 10
  num_islands: 2
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7

evaluator:
  timeout: 450
  cascade_thresholds: [0.5]
  parallel_evaluations: 1

diff_based_evolution: true
max_code_length: 10000
